<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English LMS PDF</title>

<link rel="stylesheet" href="style.css">

<style>

body{
  background:#f3f4f6;
  font-family:Arial,sans-serif;
  padding:30px;
}

.page-box{

  max-width:950px;
  margin:auto;
  background:white;
  padding:35px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;

}

h1{

  color:#2563eb;
  margin-bottom:35px;

}

.pdf-btn{

  display:inline-block;
  width:180px;
  height:70px;
  line-height:70px;
  margin:10px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;

}

.pdf-btn:hover{

  transform:scale(1.05);

}

.modal{

  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);

}

.modal-content{

  background:#111827;
  color:white;
  width:320px;
  padding:30px;
  border-radius:20px;
  text-align:center;
  margin:10% auto;
  position:relative;

}

.close-btn{

  position:absolute;
  top:10px;
  right:18px;
  font-size:28px;
  cursor:pointer;

}

.modal-btn{

  display:block;
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:#374151;
  color:white;
  text-decoration:none;
  font-weight:bold;

}

.back-btn{

  display:block;
  margin-top:40px;
  text-align:center;
  background:#111827;
  color:white;
  padding:15px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;

}

</style>

</head>

<body>

<div class="page-box">

<h1>English LMS PDF</h1>



<button
class="pdf-btn"
onclick="openModal(
'Chapter 1',
'English/LMS_PDF/Ch1-Ihaveadream.pdf'
)"
>

Chapter 1

</button>



<button
class="pdf-btn"
onclick="openModal(
'Chapter 2',
'#'
)"
>

Chapter 2

</button>



<button
class="pdf-btn"
onclick="openModal(
'Chapter 3',
'#'
)"
>

Chapter 3

</button>



<button
class="pdf-btn"
onclick="openModal(
'Chapter 4',
'#'
)"
>

Chapter 4

</button>



<div id="pdfModal" class="modal">

<div class="modal-content">

<span
class="close-btn"
onclick="closeModal()"
>

×

</span>

<h2 id="modalTitle"></h2>



<a
id="viewBtn"
class="modal-btn"
target="_blank"
>

View PDF

</a>



<a
id="downloadBtn"
class="modal-btn"
download
>

Download PDF

</a>

</div>

</div>



<a
class="back-btn"
href="index.html"
>

← Back Home

</a>

</div>



<script>

function openModal(title,pdf){

document.getElementById(
"pdfModal"
).style.display="block";

document.getElementById(
"modalTitle"
).innerText=title;

document.getElementById(
"viewBtn"
).href=pdf;

document.getElementById(
"downloadBtn"
).href=pdf;

}

function closeModal(){

document.getElementById(
"pdfModal"
).style.display="none";

}

</script>

</body>
</html>
