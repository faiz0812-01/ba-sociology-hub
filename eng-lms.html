  <style>

    body{
      background:#f3f4f6;
      font-family:Arial, sans-serif;
      padding:30px;
    }

    .page-box{

      max-width:700px;
      margin:auto;
      background:white;
      padding:35px;
      border-radius:25px;

    }

    h1{

      color:#2563eb;
      margin-bottom:30px;

    }

    .pdf-btn{

      text-decoration:none;
      font-size:18px;
      font-weight:bold;
      text-align:center;
      border-radius:18px;
      background:linear-gradient(135deg,#3b82f6,#06b6d4);
      color:white;
      transition:0.3s;

    }

    .pdf-btn:hover{

      transform:scale(1.03);
      box-shadow:0 10px 20px rgba(0,0,0,0.15);

    }

    .back-btn{

      display:block;
      margin-top:35px;
      text-align:center;
      background:#111827;
      color:white;
      padding:15px;
      border-radius:16px;
